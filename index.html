<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>جارٍ فتح الشهادة…</title>
  <style>
    body { font-family: system-ui, "Segoe UI", Tahoma, sans-serif; background:#0b3d2e;
      color:#fff; display:flex; align-items:center; justify-content:center;
      min-height:100vh; margin:0; text-align:center; }
    .box { padding:24px; }
    .spinner { width:42px; height:42px; margin:0 auto 16px; border:4px solid rgba(255,255,255,.25);
      border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    a { color:#9be7c4; }
  </style>
</head>

<body>
  <div class="box">
    <div class="spinner"></div>
    <div id="msg">جارٍ تحويلك إلى الشهادة…</div>
  </div>

  <script>
    // ============================================================
    //  THE ONLY THING YOU EDIT WHEN A DOMAIN CHANGES.
    //  This page's own URL is what the QR codes encode, so it must
    //  never change — but the domains below can change freely.
    // ============================================================
    var CONFIG = {
      // Where the certificate app is currently hosted (the frontend):
      FRONTEND_BASE: "https://services-balady-gov.vercel.app/",
      // Where the API is currently hosted (the backend):
      BACKEND_BASE:  "https://certificatesystembackend-production.up.railway.app"
    };
    // ============================================================

    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var type = params.get("type") || "";
      var msg = document.getElementById("msg"); // may be null — never assume it exists

      // Guard: no id → nothing to open.
      if (!id) {
        if (msg) msg.textContent = "رابط غير صالح (لا يوجد معرّف شهادة).";
        return;
      }

      var frontend = CONFIG.FRONTEND_BASE.replace(/\/+$/, "");
      var backend  = CONFIG.BACKEND_BASE.replace(/\/+$/, "");

      // Build the target: <frontend>/view/<id>?type=<type>&api=<backend>
      var q = new URLSearchParams();
      if (type) q.set("type", type);
      var target = frontend + "/view/" + encodeURIComponent(id) + "?" + q.toString();

      // Manual fallback link (only if the element exists — must NOT block redirect).
      if (msg) {
        msg.innerHTML = 'إذا لم يتم تحويلك تلقائياً، <a href="' + target + '">اضغط هنا</a>.';
      }

      // Redirect. This runs regardless of the DOM, so the page can never hang.
      window.location.replace(target);
    })();
  </script>
</body>

</html>
